name: Deploy EKS

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"

      - name: Create or update MySQL secret
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          kubectl create secret generic mysql-secret \
            --from-literal=DB_NAME="$DB_NAME" \
            --from-literal=DB_USERNAME="$DB_USERNAME" \
            --from-literal=DB_PASSWORD="$DB_PASSWORD" \
            --from-literal=MYSQL_ROOT_PASSWORD="$MYSQL_ROOT_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/mysql.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/ventas-deployment.yaml
          kubectl apply -f k8s/despachos-deployment.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Update deployment images
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_FRONTEND: ${{ secrets.ECR_FRONTEND }}
          ECR_BACKEND_VENTAS: ${{ secrets.ECR_BACKEND_VENTAS }}
          ECR_BACKEND_DESPACHOS: ${{ secrets.ECR_BACKEND_DESPACHOS }}
        run: |
          REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          kubectl set image deployment/frontend frontend="$REGISTRY/$ECR_FRONTEND:latest"
          kubectl set image deployment/ventas ventas="$REGISTRY/$ECR_BACKEND_VENTAS:latest"
          kubectl set image deployment/despachos despachos="$REGISTRY/$ECR_BACKEND_DESPACHOS:latest"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/frontend
          kubectl rollout status deployment/ventas
          kubectl rollout status deployment/despachos

      - name: Show cluster resources
        run: |
          kubectl get pods
          kubectl get svc
          kubectl get hpa
          kubectl get pvc
