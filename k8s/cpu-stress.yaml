apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-stress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cpu-stress
  template:
    metadata:
      labels:
        app: cpu-stress
    spec:
      nodeSelector:
        layer: back
      containers:
        - name: cpu-stress
          image: busybox:1.36
          command:
            - sh
            - -c
            - "while true; do wget -q -O- http://frontend-service; done"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 128Mi
