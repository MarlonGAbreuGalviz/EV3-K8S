apiVersion: apps/v1
kind: Deployment
metadata:
  name: despachos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: despachos
  template:
    metadata:
      labels:
        app: despachos
    spec:
      nodeSelector:
        layer: back
      containers:
        - name: despachos
          image: 787246853100.dkr.ecr.us-east-1.amazonaws.com/ev3-backend-despachos:latest
          ports:
            - containerPort: 8081
          env:
            - name: DB_ENDPOINT
              value: mysql-service
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: despachos-service
spec:
  type: NodePort
  selector:
    app: despachos
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 30082
